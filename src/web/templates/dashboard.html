<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Employees</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            line-height: 1.5;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #1a1e2e 0%, #252a3a 100%);
            padding: 1rem 2rem;
            border-bottom: 1px solid #2d333b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
        }

        .header-left .subtitle {
            font-size: 0.75rem;
            color: #8b949e;
            margin-top: 2px;
        }

        .header-stats {
            display: flex;
            gap: 2rem;
        }

        .stat-item { text-align: center; }
        .stat-value { font-size: 1.6rem; font-weight: 700; color: #fff; }
        .stat-value.green { color: #3fb950; }
        .stat-value.red { color: #f85149; }
        .stat-label { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ── Timezone Bar ── */
        .tz-bar {
            background: #161b22;
            padding: 0.5rem 2rem;
            display: flex;
            gap: 0.25rem;
            overflow-x: auto;
            border-bottom: 1px solid #21262d;
        }

        .tz-office {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.7rem;
            white-space: nowrap;
            background: #21262d;
            transition: all 0.3s;
        }

        .tz-office.active {
            background: #1a3a2a;
            border: 1px solid #238636;
        }

        .tz-office.inactive {
            opacity: 0.4;
        }

        .tz-office .count {
            font-weight: 700;
            color: #3fb950;
        }

        .tz-office.inactive .count {
            color: #8b949e;
        }

        /* ── Layout ── */
        .layout {
            display: flex;
            height: calc(100vh - 120px);
        }

        /* ── Agent Grid ── */
        .grid-panel {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .controls {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            align-items: center;
        }

        .search-box {
            padding: 0.5rem 0.75rem;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e1e4e8;
            width: 200px;
            font-size: 0.8rem;
        }

        .filter-select {
            padding: 0.5rem;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e1e4e8;
            font-size: 0.8rem;
        }

        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 0.6rem;
        }

        .agent-card {
            background: #161b22;
            border-radius: 8px;
            padding: 0.8rem;
            border: 1px solid #21262d;
            transition: all 0.3s;
            cursor: pointer;
        }

        .agent-card:hover {
            border-color: #388bfd;
            background: #1c2128;
        }

        .agent-card.active {
            border-color: #238636;
        }

        .agent-card.active .agent-status-dot {
            background: #3fb950;
            box-shadow: 0 0 8px #3fb950;
            animation: pulse 2s infinite;
        }

        .agent-card.thinking {
            border-color: #d29922;
        }

        .agent-card.thinking .agent-status-dot {
            background: #d29922;
            box-shadow: 0 0 8px #d29922;
            animation: pulse 1s infinite;
        }

        .agent-card.off {
            opacity: 0.45;
        }

        .agent-card.error {
            border-color: #f85149;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .agent-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.3rem;
        }

        .agent-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #fff;
        }

        .agent-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #484f58;
            flex-shrink: 0;
            margin-top: 5px;
        }

        .agent-role {
            font-size: 0.7rem;
            color: #8b949e;
            margin-bottom: 0.3rem;
        }

        .agent-meta {
            display: flex;
            gap: 0.5rem;
            font-size: 0.65rem;
            color: #8b949e;
        }

        .agent-doing {
            font-size: 0.65rem;
            color: #58a6ff;
            margin-top: 0.3rem;
            min-height: 1em;
        }

        /* ── Activity Feed ── */
        .feed-panel {
            width: 360px;
            background: #161b22;
            border-left: 1px solid #21262d;
            display: flex;
            flex-direction: column;
        }

        .feed-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #21262d;
            font-weight: 600;
            font-size: 0.85rem;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .feed-header .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3fb950;
            animation: pulse 2s infinite;
        }

        .feed-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .feed-item {
            padding: 0.5rem;
            border-bottom: 1px solid #21262d;
            font-size: 0.75rem;
        }

        .feed-item .feed-time {
            color: #484f58;
            font-size: 0.65rem;
        }

        .feed-item .feed-name {
            color: #58a6ff;
            font-weight: 500;
        }

        .feed-item .feed-action {
            color: #8b949e;
        }

        .feed-item.error .feed-action {
            color: #f85149;
        }

        .feed-empty {
            padding: 2rem;
            text-align: center;
            color: #484f58;
            font-size: 0.8rem;
        }

        /* ── Modal ── */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: #1c2128;
            border: 1px solid #30363d;
            border-radius: 12px;
            width: 90%;
            max-width: 550px;
            max-height: 80vh;
            overflow: auto;
        }

        .modal-header {
            padding: 1rem;
            border-bottom: 1px solid #21262d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 { font-size: 1.1rem; color: #fff; }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #8b949e; }
        .modal-body { padding: 1rem; }
        .modal-body p { margin-bottom: 0.4rem; font-size: 0.85rem; }
        .modal-body strong { color: #fff; }

        .activity-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid #21262d;
            font-size: 0.8rem;
        }

        .connection-badge {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 500;
        }

        .connection-badge.ok { background: #1a3a2a; color: #3fb950; }
        .connection-badge.fail { background: #3a1a1a; color: #f85149; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1>Shadow Employees</h1>
            <div class="subtitle">AI agents working in Microsoft 365</div>
        </div>
        <div class="header-stats">
            <div class="stat-item">
                <div class="stat-value" id="stat-total">-</div>
                <div class="stat-label">Shadows</div>
            </div>
            <div class="stat-item">
                <div class="stat-value green" id="stat-active">-</div>
                <div class="stat-label">Active Now</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-authed">0</div>
                <div class="stat-label">Onboarded</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-actions">0</div>
                <div class="stat-label">Actions</div>
            </div>
            <button id="btn-start" onclick="startCompany()" style="padding:0.5rem 1.2rem;border:none;border-radius:6px;background:#238636;color:#fff;font-weight:600;cursor:pointer;font-size:0.85rem">Start Company</button>
            <button id="btn-stop" onclick="stopCompany()" style="padding:0.5rem 1.2rem;border:none;border-radius:6px;background:#f85149;color:#fff;font-weight:600;cursor:pointer;font-size:0.85rem;display:none">Stop Company</button>
        </div>
    </header>

    <div class="tz-bar" id="tz-bar"></div>

    <div class="layout">
        <div class="grid-panel">
            <div class="controls">
                <input type="text" class="search-box" placeholder="Search shadows..." id="search-box" oninput="renderAgents()">
                <select class="filter-select" id="filter-dept" onchange="renderAgents()">
                    <option value="">All Departments</option>
                </select>
                <select class="filter-select" id="filter-status" onchange="renderAgents()">
                    <option value="">All Status</option>
                    <option value="active">Active</option>
                    <option value="off">Off Hours</option>
                </select>
            </div>
            <div class="agents-grid" id="agents-grid"></div>
        </div>

        <div class="feed-panel">
            <div class="feed-header">
                Activity Feed
                <div class="live-dot"></div>
            </div>
            <div id="kam-section" style="padding:0.75rem;border-bottom:1px solid #21262d;display:none">
                <div style="font-size:0.7rem;color:#8b949e;margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.5px">Send work to a Key Account Manager</div>
                <div id="kam-list" style="font-size:0.75rem"></div>
            </div>
            <div class="feed-list" id="feed-list">
                <div class="feed-empty">Click "Start Company" to begin. Then email a KAM with a project request.</div>
            </div>
        </div>
    </div>

    <div class="modal" id="agent-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Agent Details</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <div class="connection-badge fail" id="conn-badge">Connecting...</div>

    <script>
        let agents = [];
        let ws = null;
        let activeEmails = new Set();
        let actionCount = 0;

        let companyRunning = false;

        document.addEventListener('DOMContentLoaded', () => {
            fetchAgents();
            fetchFeed();
            fetchKams();
            checkCompanyStatus();
            connectWS();
        });

        async function fetchKams() {
            try {
                const res = await fetch('/api/company/kams');
                const kams = await res.json();
                const section = document.getElementById('kam-section');
                const list = document.getElementById('kam-list');
                if (kams.length > 0) {
                    section.style.display = 'block';
                    list.innerHTML = kams.map(k =>
                        `<div style="margin-bottom:0.3rem">
                            <span style="color:#58a6ff">${k.name}</span>
                            <span style="color:#484f58">(${k.country})</span>
                            <br><span style="color:#3fb950;font-family:monospace;font-size:0.65rem;user-select:all">${k.email}</span>
                        </div>`
                    ).join('');
                }
            } catch (e) {}
        }

        async function checkCompanyStatus() {
            try {
                const res = await fetch('/api/company/status');
                const status = await res.json();
                companyRunning = status.running;
                updateButtons();
            } catch (e) {}
        }

        function updateButtons() {
            document.getElementById('btn-start').style.display = companyRunning ? 'none' : 'inline-block';
            document.getElementById('btn-stop').style.display = companyRunning ? 'inline-block' : 'none';
        }

        async function startCompany() {
            try {
                const res = await fetch('/api/company/start', { method: 'POST' });
                const data = await res.json();
                companyRunning = true;
                updateButtons();
                alert(data.message);
            } catch (e) {
                alert('Failed to start: ' + e.message);
            }
        }

        async function stopCompany() {
            try {
                const res = await fetch('/api/company/stop', { method: 'POST' });
                const data = await res.json();
                companyRunning = false;
                updateButtons();
            } catch (e) {
                alert('Failed to stop: ' + e.message);
            }
        }

        // ── Data ──

        async function fetchAgents() {
            try {
                const res = await fetch('/api/agents');
                agents = await res.json();
                // Set defaults for WebSocket fields
                agents.forEach(a => {
                    a._active = false;
                    a._authed = false;
                    a._wsStatus = a.status || 'stopped';
                });
                populateFilters();
                renderAgents();
                updateStats();
                buildTzBar();
            } catch (e) { console.error('Fetch agents failed:', e); }
        }

        async function fetchFeed() {
            try {
                const res = await fetch('/api/agents/feed?limit=30');
                const feed = await res.json();
                renderFeed(feed);
            } catch (e) { console.error('Fetch feed failed:', e); }
        }

        // ── WebSocket ──

        function connectWS() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/ws/status`);

            ws.onopen = () => {
                document.getElementById('conn-badge').className = 'connection-badge ok';
                document.getElementById('conn-badge').textContent = 'Live';
            };

            ws.onclose = () => {
                document.getElementById('conn-badge').className = 'connection-badge fail';
                document.getElementById('conn-badge').textContent = 'Reconnecting...';
                setTimeout(connectWS, 5000);
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'status_update') {
                    activeEmails = new Set(
                        data.agents.filter(a => a.active).map(a => a.email)
                    );
                    document.getElementById('stat-active').textContent = data.active_count;

                    // Update orchestrator stats
                    if (data.orchestrator) {
                        const o = data.orchestrator;
                        companyRunning = o.running;
                        updateButtons();
                        document.getElementById('stat-authed').textContent = `${o.authed}/${o.total}`;
                        document.getElementById('stat-actions').textContent = o.actions;
                    }

                    // Update agent statuses
                    data.agents.forEach(u => {
                        const agent = agents.find(a => a.email === u.email);
                        if (agent) {
                            agent._active = u.active;
                            agent._authed = u.authed;
                            agent._wsStatus = u.status;
                        }
                    });
                    renderAgents();
                    buildTzBar();

                    // Refresh feed periodically when company is running
                    if (companyRunning && data.orchestrator && data.orchestrator.ticks > 0) {
                        if (!window._lastFeedRefresh || Date.now() - window._lastFeedRefresh > 15000) {
                            window._lastFeedRefresh = Date.now();
                            fetchFeed();
                        }
                    }
                }
            };
        }

        // ── Timezone Bar ──

        function buildTzBar() {
            const bar = document.getElementById('tz-bar');
            // Group agents by country
            const countries = {};
            agents.forEach(a => {
                const c = a.country || 'Unknown';
                if (!countries[c]) countries[c] = { flag: a.flag, count: 0, active: 0 };
                countries[c].count++;
                if (a._active || activeEmails.has(a.email)) countries[c].active++;
            });

            // Sort by active count desc
            const sorted = Object.entries(countries).sort((a, b) => b[1].active - a[1].active);

            bar.innerHTML = sorted.map(([name, data]) => {
                const cls = data.active > 0 ? 'active' : 'inactive';
                return `<div class="tz-office ${cls}">
                    ${data.flag} <span class="count">${data.active}</span>/${data.count}
                </div>`;
            }).join('');
        }

        // ── Agents Grid ──

        function populateFilters() {
            const sel = document.getElementById('filter-dept');
            const depts = [...new Set(agents.map(a => a.department))].sort();
            sel.innerHTML = '<option value="">All Departments</option>' +
                depts.map(d => `<option value="${d}">${d}</option>`).join('');
        }

        function renderAgents() {
            const grid = document.getElementById('agents-grid');
            const search = document.getElementById('search-box').value.toLowerCase();
            const dept = document.getElementById('filter-dept').value;
            const statusFilter = document.getElementById('filter-status').value;

            let filtered = agents.filter(a => {
                if (search && !a.name.toLowerCase().includes(search) && !a.role.toLowerCase().includes(search)) return false;
                if (dept && a.department !== dept) return false;
                const isActive = a._active || activeEmails.has(a.email);
                if (statusFilter === 'active' && !isActive) return false;
                if (statusFilter === 'off' && isActive) return false;
                return true;
            });

            // Sort: active first, then by name
            filtered.sort((a, b) => {
                const aActive = a._active || activeEmails.has(a.email) ? 0 : 1;
                const bActive = b._active || activeEmails.has(b.email) ? 0 : 1;
                if (aActive !== bActive) return aActive - bActive;
                return a.name.localeCompare(b.name);
            });

            grid.innerHTML = filtered.map(a => {
                const isActive = a._active || activeEmails.has(a.email);
                const isAuthed = a._authed || false;
                const wsStatus = a._wsStatus || '';
                const hasError = wsStatus === 'error' || a.status === 'error';
                let cls = 'off';
                if (isActive && isAuthed) cls = 'active';
                else if (isActive && !isAuthed && companyRunning) cls = 'off'; // onboarding
                if (hasError) cls = 'error';
                if (wsStatus === 'thinking' || wsStatus === 'fetching') cls = 'thinking';

                let doingText = '';
                if (!isActive) doingText = '';
                else if (wsStatus === 'fetching') { doingText = 'Reading inbox...'; cls = 'thinking'; }
                else if (wsStatus === 'thinking') { doingText = 'Thinking...'; cls = 'thinking'; }
                else if (wsStatus === 'executing') { doingText = 'Sending actions...'; cls = 'active'; }
                else if (wsStatus === 'error') { doingText = 'Error'; cls = 'error'; }
                else if (isAuthed) doingText = 'Online';
                else if (companyRunning) doingText = 'Onboarding...';
                else doingText = 'Ready';

                return `<div class="agent-card ${cls}" onclick="showDetail('${a.email}')">
                    <div class="agent-top">
                        <div class="agent-name">${a.flag} ${a.name}</div>
                        <div class="agent-status-dot"></div>
                    </div>
                    <div class="agent-role">${a.role}</div>
                    <div class="agent-meta">
                        <span>${a.local_time}</span>
                        <span>${a.department}</span>
                        ${a.last_tick_at ? `<span>${timeAgo(a.last_tick_at)}</span>` : ''}
                    </div>
                    <div class="agent-doing">${doingText}</div>
                </div>`;
            }).join('');
        }

        // ── Activity Feed ──

        function renderFeed(feed) {
            const list = document.getElementById('feed-list');
            if (!feed || feed.length === 0) {
                list.innerHTML = '<div class="feed-empty">No activity yet. Start agents to see actions here.</div>';
                return;
            }

            actionCount = feed.length;
            document.getElementById('stat-actions').textContent = actionCount;

            // Separate interesting vs boring items
            const interesting = feed.filter(f => f.action !== 'Checked inbox' || f.result === 'error');
            const boring = feed.filter(f => f.action === 'Checked inbox' && f.result !== 'error');

            // Show interesting items first, then fill with boring if needed (min 5 shown)
            const toShow = interesting.length >= 5 ? interesting : [...interesting, ...boring.slice(0, 5 - interesting.length)];

            list.innerHTML = toShow.map(f => {
                const t = new Date(f.timestamp);
                const time = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const isError = f.result === 'error';
                const isBoring = f.action === 'Checked inbox';
                const iconMap = {email: '📧', event: '🎭', file: '📄', calendar: '📅', inbox: '📨', tick: '⚡'};
                const icon = isError ? '❌' : (iconMap[f.icon] || '⚡');

                return `<div class="feed-item ${isError ? 'error' : ''}" ${isBoring ? 'style="opacity:0.5"' : ''}>
                    <span class="feed-time">${time}</span>
                    <span class="feed-name">${f.name}</span>
                    <span class="feed-action">${icon} ${f.action}</span>
                    ${f.error ? `<div style="color:#f85149;font-size:0.65rem">${f.error}</div>` : ''}
                </div>`;
            }).join('') || '<div class="feed-empty">Waiting for agent activity...</div>';
        }

        // ── Modal ──

        async function showDetail(email) {
            const modal = document.getElementById('agent-modal');
            const body = document.getElementById('modal-body');
            body.innerHTML = '<p style="color:#8b949e">Loading...</p>';
            modal.classList.add('active');

            try {
                const [detailRes, actRes] = await Promise.all([
                    fetch(`/api/agents/by-email/${encodeURIComponent(email)}`),
                    fetch(`/api/agents/by-email/${encodeURIComponent(email)}/activity?limit=15`)
                ]);

                const detail = await detailRes.json();
                const activity = await actRes.json();

                document.getElementById('modal-title').textContent = `${detail.flag} ${detail.name}`;

                body.innerHTML = `
                    <div style="margin-bottom:1rem">
                        <p><strong>Role:</strong> ${detail.job_title}</p>
                        <p><strong>Department:</strong> ${detail.department}</p>
                        <p><strong>Country:</strong> ${detail.country} (${detail.local_time})</p>
                        <p><strong>Timezone:</strong> ${detail.timezone}</p>
                        <p><strong>Style:</strong> ${detail.writing_style}, ${detail.communication_style}</p>
                        ${detail.manager_email ? `<p><strong>Manager:</strong> ${detail.manager_email.split('@')[0]}</p>` : ''}
                        <p><strong>Status:</strong> ${detail.status}</p>
                        ${detail.last_error ? `<p style="color:#f85149"><strong>Last Error:</strong> ${detail.last_error}</p>` : ''}
                    </div>
                    <h3 style="margin-bottom:0.5rem;font-size:0.9rem">Workflow Timeline</h3>
                    ${activity.length === 0 ? '<p style="color:#484f58">No activity yet. This shadow will start working when "Start Company" is clicked and they are onboarded.</p>' :
                        activity.map(a => {
                            const time = new Date(a.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
                            const isErr = a.result === 'error';
                            let icon = '⚡';
                            let desc = a.action_type;

                            // Parse action_data for human-readable descriptions
                            if (a.action_data) {
                                const actions = a.action_data.actions_taken || [];
                                const emailsSent = actions.filter(x => x.type === 'send_email' || x.type === 'reply_email');
                                const meetings = actions.filter(x => x.type && x.type.includes('meeting'));
                                const noAction = actions.filter(x => x.type === 'no_action');

                                if (emailsSent.length > 0) {
                                    icon = '📧';
                                    desc = emailsSent.map(e => {
                                        if (e.type === 'reply_email') return 'Replied to email';
                                        return 'Sent email to ' + (e.to || '').split('@')[0];
                                    }).join(', ');
                                } else if (meetings.length > 0) {
                                    icon = '📅';
                                    desc = meetings.map(m => m.type.replace('_', ' ')).join(', ');
                                } else if (noAction.length > 0) {
                                    icon = '📨';
                                    desc = 'Checked inbox — ' + (noAction[0].reason || 'nothing to do');
                                } else if (actions.length > 0) {
                                    desc = actions.map(x => x.type).join(', ');
                                }
                            }

                            if (isErr) { icon = '❌'; desc = a.error_message || 'Error'; }

                            return '<div class="activity-item">' +
                                '<span style="color:#484f58">' + time + '</span> ' +
                                '<span>' + icon + '</span> ' +
                                '<span style="color:' + (isErr ? '#f85149' : '#e1e4e8') + '">' + desc + '</span>' +
                            '</div>';
                        }).join('')
                    }
                `;
            } catch (e) {
                body.innerHTML = `<p style="color:#f85149">Failed to load details: ${e.message}</p>`;
            }
        }

        function closeModal() {
            document.getElementById('agent-modal').classList.remove('active');
        }

        document.getElementById('agent-modal').addEventListener('click', e => {
            if (e.target.classList.contains('modal')) closeModal();
        });

        // ── Helpers ──

        function updateStats() {
            document.getElementById('stat-total').textContent = agents.length;
            const errorCount = agents.filter(a => a.status === 'error').length;
            document.getElementById('stat-errors').textContent = errorCount;
        }

        function timeAgo(iso) {
            if (!iso) return '';
            const diff = (Date.now() - new Date(iso).getTime()) / 1000;
            if (diff < 60) return 'just now';
            if (diff < 3600) return Math.floor(diff/60) + 'm ago';
            if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
            return Math.floor(diff/86400) + 'd ago';
        }
    </script>
</body>
</html>
