# Synthetic Employees Configuration
# Central configuration for the Agency CLI-based agent system

instance_name: "TextCraft Europe"

# Agency CLI Settings
agency:
  binary_path: "agency"               # Path to agency binary
  default_backend: "copilot"           # "copilot" (free) or "claude" (premium)
  premium_backend: "claude"            # Backend for client-facing tasks
  premium_roles:                       # Roles that get premium backend for external comms
    - "Key Account Manager"
    - "Key Account Director"
    - "CEO"
    - "Editorial Director"
  default_timeout: 300                  # seconds per agent invocation (Agency CLI needs time to start)
  role_timeouts:                       # Override timeouts per role
    Writer: 180
    Academic Writer: 180
    Corporate Writer: 180
    Technical Writer: 180
    CEO: 90
    COO: 90
    CFO: 90
    CCO: 90
  agent_directory: ".github/agents"    # Where agent templates live
  mcp_servers: []                      # No MCP servers - M365 access via Python MCPClient

# Tenant domain (for detecting external vs internal emails)
tenant_domain: "a830edad9050849coep9vqp9bog.onmicrosoft.com"

# Concurrency Control
concurrency:
  max_concurrent: 3                    # Agency CLI sessions (keep low to avoid conflicts)                   # Max simultaneous Agency CLI processes
  circuit_breaker_threshold: 3         # Consecutive failures before cooldown
  circuit_breaker_cooldown: 3600       # Cooldown duration in seconds (1 hour)
  debounce_seconds: 300                # Min seconds between same-employee executions

# Scheduling
scheduling:
  check_interval_seconds: 60           # Main loop check interval
  variance_percent: 20                 # Randomization on check intervals (±%)
  enable_weekends: false
  cultural_schedules:
    IT:
      work_start: "09:00"
      work_end: "18:00"
      lunch_start: "12:30"
      lunch_end: "14:00"
      timezone: "Europe/Rome"
